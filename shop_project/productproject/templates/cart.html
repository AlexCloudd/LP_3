{% extends 'base.html' %}

{% block title %}Корзина — VINYL{% endblock %}

{% block extra_styles %}
<style>
    .cart-empty {
        text-align: center;
        padding: 120px 20px;
        max-width: 700px;
        margin: 60px auto;
    }

    .cart-empty h1 {
        font-size: 2.6rem;
        margin-bottom: 25px;
    }

    .empty-text {
        font-size: 1.45rem;
        color: #888;
        margin-bottom: 50px;
        line-height: 1.6;
    }

    .btn {
        display: inline-block;
        background: #ffffff;
        color: #000000;
        padding: 15px 40px;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1.1rem;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
        transition: all 0.3s;
    }

    .btn:hover {
        background: #ddd;
        transform: translateY(-3px);
    }
</style>
{% endblock %}

{% block content %}
    <div class="cart-empty">
        <h1>Корзина пуста</h1>
        <p class="empty-text">Ваша корзина пока пуста.<br>Добавьте пластинки из каталога, чтобы оформить заказ.</p>
        <a href="{% url 'productproject:plate_list' %}" class="btn">Перейти в каталог</a>
    </div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Удаление пластинки — VINYL{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 80px 20px;">
        <h1 style="color: #ff6666; margin-bottom: 20px;">Вы уверены?</h1>
        <p style="font-size: 1.15rem; margin-bottom: 45px; max-width: 600px; margin-left: auto; margin-right: auto;">
            Вы действительно хотите удалить пластинку <strong>"{{ object.name }}"</strong>?
        </p>
        
        <form method="post" style="display: inline-flex; gap: 22px; align-items: center;">
            {% csrf_token %}
            <button type="submit" 
                    style="background:#b30000; color:white; padding:14px 34px; border:none; border-radius:6px; font-size:1.05rem; font-weight:500;">
                Да, удалить
            </button>
            <a href="{% url 'productproject:plate_list' %}" 
               style="color:#aaa; font-size:1.05rem; text-decoration: none;">
                Отмена
            </a>
        </form>
    </div>
{% endblock %}

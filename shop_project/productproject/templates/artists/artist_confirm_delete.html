{% extends 'base.html' %}

{% block title %}Удаление исполнителя — VINYL{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 60px 20px;">
        <h1 style="color: #ff6666;">Вы уверены?</h1>
        <p>Вы действительно хотите удалить исполнителя <strong>"{{ object.name }}"</strong>?</p>
        
        <form method="post" style="margin-top: 30px;">
            {% csrf_token %}
            <button type="submit" style="background:#b30000; color:white; padding:12px 30px; border:none; border-radius:4px;">
                Да, удалить
            </button>
            <a href="{% url 'productproject:artist_list' %}" style="margin-left:20px; color:#aaa;">Отмена</a>
        </form>
    </div>
{% endblock %}

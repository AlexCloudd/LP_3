{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VINYL STORE{% endblock %}</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: Arial, sans-serif; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { 
            background: #000; 
            padding: 18px 0; 
            text-align: center; 
            border-bottom: 1px solid #333; 
        }

        nav a { 
            color: #fff; 
            margin: 0 18px; 
            text-decoration: none; 
        }

        nav a:hover { color: #aaa; }

        main { 
            flex: 1 0 auto; 
            padding: 20px 0;
        }

        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 0 20px;
        }

        h1 { 
            text-align: center; 
            margin: 40px 0 25px; 
            font-size: 2.5rem; 
        }

        footer {
            background: #0a0a0a;
            color: #666;
            text-align: center;
            padding: 16px 0;
            font-size: 0.9rem;
            border-top: 1px solid #222;
            margin-top: auto;
        }
    </style>

    {% block extra_styles %}{% endblock %}
</head>
<body>
    {% include "_inc/_header.html" %}

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    {% include "_inc/_footer.html" %}
</body>
</html>
